<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
    <title>Hundir la flota</title>
  </head>
  <body>
    <h1>Hundir la flota</h1>
    <div class="gameboards">
      <div class="player">
        <h2>Jugador</h2>
        <div id="player-board"></div>
      </div>
      <div class="cpu">
        <h2>Ordenador</h2>
        <div id="cpu-board"></div>
      </div>
    </div>
    <div class="controls">
      <button type="button" id="place-btn">Colocar barco</button>
      <button type="button" id="start-btn">Comenzar partida</button>
      <button type="button" id="reset-btn">Reiniciar partida</button>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
