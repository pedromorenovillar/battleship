<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="A JavaScript implementation of the classic Battleship game, built using Test-Driven Development (TDD) with Jest. This project demonstrates object-oriented programming concepts, modular design, and TDD principles.">
    <title>Hundir la flota</title>
  </head>
  <body>
    <main>

      <h1>Hundir la flota</h1>
      <div id="info-msg"></div>
      <div class="gameboards">
        <div class="player">
          <h2>Jugador</h2>
          <div id="player-board"></div>
        </div>
        <div class="cpu">
          <h2>Enemigo</h2>
          <div id="cpu-board"></div>
        </div>
      </div>
      <div class="controls">
        <button type="button" id="reset-btn">Reiniciar</button>
      </div>
      <script type="module" src="./index.js"></script>
    </main>
    </body>
</html>
